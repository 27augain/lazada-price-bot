name: Price Tracker Cron

on:
  schedule:
    # Chạy vào phút 0 của mỗi giờ thứ 2 (chạy mỗi 2 tiếng)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ giao diện GitHub

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4
      
    - name: Thiết lập Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Cài đặt trình duyệt Playwright
      run: playwright install chromium
        
    - name: Chạy script quét giá
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
      run: python main.py
