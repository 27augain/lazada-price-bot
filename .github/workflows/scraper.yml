name: Price Tracker Cron

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-22.04

    steps:
    - name: Kiểm tra mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cài đặt Playwright + system deps
      run: playwright install --with-deps chromium

    - name: Chạy script quét giá
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
      run: python main.py
